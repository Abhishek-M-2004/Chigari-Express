<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple QR Code Generator</title>

    <!-- QR Code Library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 350px;
        }

        h1 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #3a86ff;
            color: white;
            border: none;
            border-radius: 6px;
        }

        #qrcode {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>QR Code Generator</h1>

    <label for="text-input">Enter text / URL</label><br><br>
    <input type="text" id="text-input" placeholder="Enter text here">

    <button onclick="generateQRCode()">Generate QR Code</button>

    <div id="qrcode"></div>
</div>

<script>
    function generateQRCode() {
        const text = document.getElementById("text-input").value;
        const qrContainer = document.getElementById("qrcode");

        // Clear old QR code
        qrContainer.innerHTML = "";

        if (!text) {
            alert("Please enter some text");
            return;
        }

        new QRCode(qrContainer, {
            text: text,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    }
</script>

</body>
</html>
