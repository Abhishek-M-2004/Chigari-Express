<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chigiri Express</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050505;
            --bg-panel: #0a0a0f;
            --accent: #ff003c; /* Chigiri Red */
            --accent-dim: rgba(255, 0, 60, 0.2);
            --text-main: #ffffff;
            --text-dim: #6e6e7a;
            --border: rgba(255, 255, 255, 0.1);
            --glass: rgba(10, 10, 15, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        /* --- LEFT SIDE: THE VISUAL HUD --- */
        .visual-side {
            flex: 1.5; /* Takes up 60% of screen */
            position: relative;
            background: radial-gradient(circle at center, #111115 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-right: 1px solid var(--border);
        }

        /* The Moving Grid Floor */
        .grid-floor {
            position: absolute;
            bottom: -50%;
            left: -50%;
            width: 200%;
            height: 100%;
            background-image: 
                linear-gradient(var(--accent-dim) 1px, transparent 1px),
                linear-gradient(90deg, var(--accent-dim) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(500px) rotateX(60deg);
            animation: moveGrid 3s linear infinite;
            opacity: 0.3;
            z-index: 1;
        }

        @keyframes moveGrid {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(60px); }
        }

        /* Big Typography */
        .hero-text {
            z-index: 2;
            text-align: center;
            text-transform: uppercase;
        }

        .hero-text h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 8rem;
            line-height: 0.8;
            color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .hero-text h1::after {
            content: 'CHIGIRI';
            position: absolute;
            left: 0; top: 0;
            color: white;
            opacity: 0.1;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            animation: glitch 2s infinite;
        }

        .hero-text h2 {
            font-size: 2rem;
            letter-spacing: 1rem;
            color: var(--accent);
            margin-top: 20px;
            font-weight: 700;
        }

        /* Decorative Rings */
        .ring {
            position: absolute;
            border-radius: 50%;
            border: 1px dashed var(--accent);
            opacity: 0.2;
            animation: rotate 20s linear infinite;
        }
        .ring-1 { width: 600px; height: 600px; border-color: #fff; animation-direction: reverse; }
        .ring-2 { width: 400px; height: 400px; border-style: solid; border-width: 1px; }

        @keyframes rotate { 100% { transform: rotate(360deg); } }
        @keyframes glitch { 
            0% { transform: translate(0,0); } 
            20% { transform: translate(-2px, 2px); } 
            40% { transform: translate(2px, -2px); } 
            100% { transform: translate(0,0); }
        }

        /* --- RIGHT SIDE: THE CONTROL PANEL (Login) --- */
        .control-side {
            flex: 1; /* Takes up 40% of screen */
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 80px;
            position: relative;
            z-index: 10;
        }

        /* Scanline effect over the form side */
        .control-side::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(
                transparent 0px,
                transparent 2px,
                rgba(0,0,0,0.2) 3px
            );
            pointer-events: none;
            z-index: 0;
        }

        .login-container {
            position: relative;
            z-index: 2;
        }

        .panel-header {
            margin-bottom: 50px;
            border-left: 4px solid var(--accent);
            padding-left: 20px;
        }

        .panel-header h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent);
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .panel-header h1 {
            color: white;
            font-size: 2.5rem;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 30px;
        }

        .input-group label {
            display: flex;
            justify-content: space-between;
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 2px solid #333;
            padding: 15px 0;
            color: white;
            font-size: 1.2rem;
            font-family: 'Rajdhani', sans-serif;
            transition: 0.3s;
            border-radius: 0;
        }

        .form-input:focus {
            outline: none;
            border-bottom-color: var(--accent);
            background: linear-gradient(to bottom, transparent, rgba(255, 0, 60, 0.05));
        }

        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 20px;
            background: var(--accent);
            border: none;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 95% 100%, 0 100%);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background: white;
            color: var(--accent);
            box-shadow: 0 0 30px var(--accent);
        }

        /* Tech decorators */
        .status-bar {
            position: absolute;
            bottom: 40px;
            left: 80px;
            right: 80px;
            display: flex;
            justify-content: space-between;
            color: #444;
            font-size: 0.8rem;
            border-top: 1px solid #222;
            padding-top: 15px;
        }

        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Alert */
        .alert {
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 15px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .alert-success {
            border-color: #00ffaa;
            color: #00ffaa;
            background: rgba(0, 255, 170, 0.1);
        }

        /* Responsive */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            .visual-side { height: 40vh; flex: none; border-right: none; border-bottom: 1px solid var(--border); }
            .hero-text h1 { font-size: 4rem; }
            .control-side { flex: 1; padding: 40px; min-height: 60vh; }
        }
    </style>
</head>
<body>

    <div class="visual-side">
        <div class="grid-floor"></div>
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        
        <div class="hero-text">
            <h1>CHIGIRI</h1>
            <h2>EXPRESS</h2>
        </div>
    </div>

    <div class="control-side">
        <div class="login-container">
            <div class="panel-header">
                <h3>// SYSTEM ACCESS</h3>
                <h1>IDENTIFY</h1>
            </div>

            <div class="alert" id="alert">
                <i class="fas fa-exclamation-circle"></i>
                <div id="alert-message">Error message</div>
            </div>

            <div class="input-group">
                <label>
                    <span>User ID</span>
                    <span style="color: var(--accent);">[REQ]</span>
                </label>
                <input type="email" id="email" class="form-input" placeholder=">> ENTER EMAIL">
            </div>

            <div class="input-group">
                <label>
                    <span>Passcode</span>
                    <span style="color: var(--accent);">[SECURE]</span>
                </label>
                <input type="password" id="password" class="form-input" placeholder=">> ENTER PASSWORD">
            </div>

            <button class="btn" onclick="login()">
                Initialise <i class="fas fa-chevron-right" style="margin-left: 10px;"></i>
            </button>
            
            <p style="margin-top: 20px; color: #555; font-size: 0.9rem;">
                NO CREDENTIALS? <a href="register.html" style="color: var(--text-dim); text-decoration: underline;">REQUEST ACCESS</a>
            </p>
        </div>

        <div class="status-bar">
            <span>SYS: ONLINE</span>
            <span>LOC: HUBBALLI</span>
            <span><span class="blink">●</span> CONNECTED</span>
        </div>
    </div>

    <script>
        // FUNCTIONALITY PRESERVED
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alert = document.getElementById('alert');
            const alertMessage = document.getElementById('alert-message');
            
            if (!email || !password) {
                alert.className = 'alert';
                alertMessage.textContent = 'ACCESS DENIED: INPUTS REQUIRED';
                alert.style.display = 'flex';
                return;
            }
            
            alert.className = 'alert';
            alert.style.border = '1px solid white';
            alert.style.color = 'white';
            alertMessage.textContent = 'PROCESSING...';
            alert.style.display = 'flex';
            
            try {
                const res = await fetch("http://localhost:5000/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const user = await res.json();
                
                if (res.ok) {
                    localStorage.setItem("user", JSON.stringify(user));
                    alert.className = 'alert alert-success';
                    alertMessage.textContent = 'AUTHENTICATION VERIFIED';
                    setTimeout(() => { window.location.href = "book.html"; }, 1500);
                } else {
                    alert.className = 'alert';
                    alertMessage.textContent = (user.message || 'INVALID CREDENTIALS').toUpperCase();
                }
            } catch (error) {
                alert.className = 'alert';
                alertMessage.textContent = 'CONNECTION FAILURE';
            }
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
