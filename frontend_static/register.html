<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Chigiri Express</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-core: #08080b;
            --bg-secondary: #0f0f14;
            --accent: #ff003c;
            --accent-glow: rgba(255, 0, 60, 0.4);
            --text-white: #ffffff;
            --text-gray: #8f90a6;
            --input-bg: rgba(255, 255, 255, 0.03);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            /* The Cut Size */
            --cut-size: 40px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-core);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            color: var(--text-white);
        }

        /* --- LEFT PANEL (Visuals) --- */
        .visual-panel {
            flex: 1.2;
            position: relative;
            background: linear-gradient(135deg, #050505 0%, #1a1a20 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            overflow: hidden;
        }

        /* Speed Lines Animation */
        .speed-lines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }
        .line {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
            transform: skewX(-45deg);
            animation: speedPass 3s infinite linear;
        }
        .l1 { top: 20%; width: 50%; left: -50%; animation-duration: 4s; }
        .l2 { top: 40%; width: 80%; left: -80%; animation-duration: 2.5s; animation-delay: 0.5s; }
        .l3 { top: 70%; width: 60%; left: -60%; animation-duration: 3s; animation-delay: 1.2s; }

        @keyframes speedPass {
            0% { transform: translateX(0) skewX(-45deg); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateX(200%) skewX(-45deg); opacity: 0; }
        }

        .hero-content { z-index: 2; position: relative; }
        
        .logo-mark {
            width: 60px; height: 60px;
            background: var(--accent);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
            box-shadow: 0 0 30px var(--accent-glow);
            margin-bottom: 30px;
        }

        .hero-content h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 5rem; line-height: 1; font-weight: 700;
            text-transform: uppercase; letter-spacing: -1px; margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .hero-content h1 span { color: var(--accent); -webkit-text-fill-color: var(--accent); font-style: italic; }
        
        .hero-content p {
            color: var(--text-gray); font-size: 1.2rem; max-width: 400px;
            margin-top: 20px; line-height: 1.6; border-left: 3px solid var(--accent);
            padding-left: 20px;
        }

        /* --- RIGHT PANEL (Interface) --- */
        .form-panel {
            flex: 1;
            background: var(--bg-secondary);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .form-panel::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 0; pointer-events: none;
        }

        /* --- THE CUT CARD STYLING --- */
        
        /* 1. The Wrapper creates the border and drop shadow */
        .card-wrapper {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
            /* Gradient Border Color */
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            padding: 1px; /* This padding dictates border thickness */
            
            /* The Cut Shape (Top-Left & Bottom-Right) */
            clip-path: polygon(
                var(--cut-size) 0, 
                100% 0, 
                100% calc(100% - var(--cut-size)), 
                calc(100% - var(--cut-size)) 100%, 
                0 100%, 
                0 var(--cut-size)
            );
            
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            transition: transform 0.3s ease;
        }

        .card-wrapper:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, var(--accent), rgba(255,255,255,0.05));
        }

        /* 2. The Inner Card holds the content */
        .form-card {
            background: rgba(15, 15, 20, 0.95); /* Dark background */
            padding: 50px;
            
            /* Must match the wrapper's clip-path EXACTLY */
            clip-path: polygon(
                var(--cut-size) 0, 
                100% 0, 
                100% calc(100% - var(--cut-size)), 
                calc(100% - var(--cut-size)) 100%, 
                0 100%, 
                0 var(--cut-size)
            );
        }

        .form-header { margin-bottom: 35px; text-align: center; }
        .form-header h2 { font-size: 2rem; font-weight: 600; margin-bottom: 8px; color: white; }
        .form-header p { color: var(--text-gray); font-size: 0.95rem; }

        .input-group { margin-bottom: 25px; }
        .input-label {
            display: block; margin-bottom: 8px; color: var(--text-gray);
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
        }

        .form-input {
            width: 100%; padding: 16px 20px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 4px;
            color: #fff; font-size: 1rem; transition: var(--transition);
        }

        .form-input:focus {
            outline: none; border-color: var(--accent);
            background: rgba(255, 0, 60, 0.05);
            box-shadow: 0 0 15px rgba(255, 0, 60, 0.1);
        }

        .btn {
            width: 100%; padding: 18px;
            background: var(--accent);
            border: none; border-radius: 4px;
            color: white; font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: var(--transition);
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .btn:hover {
            background: white; color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .form-footer { margin-top: 25px; text-align: center; font-size: 0.9rem; color: var(--text-gray); }
        .form-footer a {
            color: white; text-decoration: none; font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 2px;
        }
        .form-footer a:hover { color: var(--accent); border-bottom-color: var(--accent); }

        /* Responsive */
        @media (max-width: 900px) {
            body { flex-direction: column; overflow-y: auto; }
            .visual-panel { flex: none; height: 30vh; padding: 40px; }
            .hero-content h1 { font-size: 3rem; }
            .form-panel { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="visual-panel">
        <div class="speed-lines">
            <div class="line l1"></div>
            <div class="line l2"></div>
            <div class="line l3"></div>
        </div>
        
        <div class="hero-content">
            <div class="logo-mark"><i class="fas fa-bolt"></i></div>
            <h1>Chigiri<br><span>Express</span></h1>
            <p>High-velocity travel requires a high-security identity. Create yours now.</p>
        </div>
    </div>

    <div class="form-panel">
        <div class="card-wrapper">
            <div class="form-card">
                <div class="form-header">
                    <h2>New Account</h2>
                    <p>Enter your details to generate your passenger ID</p>
                </div>

                <div class="alert" id="alert" style="display:none; color: var(--accent); margin-bottom: 15px; font-size: 0.9rem;">
                    <i class="fas fa-exclamation-circle"></i> <span id="alert-message">Error</span>
                </div>

                <div class="input-group">
                    <label class="input-label" for="name">Full Name</label>
                    <input type="text" id="name" class="form-input" placeholder="name">
                </div>

                <div class="input-group">
                    <label class="input-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="email">
                </div>

                <div class="input-group">
                    <label class="input-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Min. 6 characters">
                </div>

                <button class="btn" onclick="register()">
                    Create Account <i class="fas fa-arrow-right"></i>
                </button>

                <div class="form-footer">
                    Already have a Passenger ID? <a href="login.html">Login Here</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Exact same logic as before
        async function register() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertBox = document.getElementById('alert');
            const alertMsg = document.getElementById('alert-message');
            
            if (!name || !email || !password) {
                alertBox.style.display = 'block';
                alertMsg.textContent = 'Please fill in all fields';
                return;
            }
            
            if (password.length < 6) {
                alertBox.style.display = 'block';
                alertMsg.textContent = 'Password must be at least 6 characters';
                return;
            }

            // Simulate loading
            alertBox.style.display = 'block';
            alertBox.style.color = 'white';
            alertMsg.textContent = 'Processing...';
            
            try {
                const response = await fetch("http://localhost:5000/api/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name, email, password })
                });
                
                if (response.ok) {
                    alertBox.style.color = '#00ff9d';
                    alertMsg.textContent = 'Success! Redirecting...';
                    setTimeout(() => { window.location.href = "login.html"; }, 2000);
                } else {
                    const errorData = await response.json();
                    alertBox.style.color = '#ff003c';
                    alertMsg.textContent = errorData.message || 'Registration failed';
                }
            } catch (error) {
                alertBox.style.color = '#ff003c';
                alertMsg.textContent = 'Network error.';
            }
        }
        
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
